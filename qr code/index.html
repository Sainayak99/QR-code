<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Code Scanner</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
    <div class="container">
        <h1>QR Code Scanner</h1>
        <div class="camera-wrapper">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
        <div class="overlay-corner top-left"></div>
        <div class="overlay-corner top-right"></div>
        <div class="overlay-corner bottom-left"></div>
        <div class="overlay-corner bottom-right"></div>
        </div>
        <p id="status">Press Start to activate the camera.</p>
        <button id="start-btn">Start Scanner</button>
        <div id="result-box" class="hidden">
            <p class="result-label">Detected:</p>
            <p id="result-text"></p>
      </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
